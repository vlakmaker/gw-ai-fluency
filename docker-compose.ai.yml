# Instance 2: playbook.aiskillsquiz.com
# Caddy reverse-proxies to localhost:8081
# Usage: docker compose -f docker-compose.ai.yml up -d --build
services:
  playbook-ai:
    build:
      context: .
      args:
        BASE_PATH: /
        SITE_URL: https://playbook.aiskillsquiz.com
    container_name: gw-ai-fluency-ai
    restart: unless-stopped
    ports:
      - "8081:80"
