name: Test & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Content Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build site with Quartz
        run: |
          git clone --depth 1 https://github.com/jackyzha0/quartz.git quartz-build
          cd quartz-build
          npm ci
          cp ../quartz.config.ts quartz.config.ts
          cp ../quartz.layout.ts quartz.layout.ts
          cp -r ../playbook/* content/
          npx quartz build

      - name: Deploy to CX32
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CX32_HOST }}
          username: ${{ secrets.CX32_USER }}
          key: ${{ secrets.CX32_SSH_KEY }}
          script: |
            cd /opt/apps/gw-ai-fluency
            git pull origin master
            docker compose up -d --build

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CX32_HOST }}
          username: ${{ secrets.CX32_USER }}
          key: ${{ secrets.CX32_SSH_KEY }}
          script: |
            sleep 10
            docker compose -f /opt/apps/gw-ai-fluency/docker-compose.yml ps --format json | grep -q '"running"'
