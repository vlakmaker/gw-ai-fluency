name: Test & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    name: Validate & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify Astro build
        run: npm run build

  deploy:
    name: Deploy to CX32
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CX32_HOST }}
          username: ${{ secrets.CX32_USER }}
          key: ${{ secrets.CX32_SSH_KEY }}
          script: |
            cd /opt/apps/gw-ai-fluency
            git pull origin master

            # Build and deploy single container (Caddy handles both domains)
            docker compose down --remove-orphans || true
            docker compose up -d --build

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CX32_HOST }}
          username: ${{ secrets.CX32_USER }}
          key: ${{ secrets.CX32_SSH_KEY }}
          script: |
            sleep 10
            docker compose -f /opt/apps/gw-ai-fluency/docker-compose.yml ps --format json | grep -q '"running"'
