# Playbook: playbook.informationgeek.org + playbook.aiskillsquiz.com
# Caddy reverse-proxies to this container by name on the shared caddy network
services:
  playbook:
    build: .
    container_name: gw-ai-fluency-playbook
    restart: unless-stopped
    networks:
      - caddy
    ports:
      - "8080:80"

networks:
  caddy:
    external: true
