services:
  playbook:
    build: .
    container_name: gw-ai-fluency-playbook
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.playbook.rule=Host(`playbook.informationgeek.org`)"
      - "traefik.http.routers.playbook.entrypoints=websecure"
      - "traefik.http.routers.playbook.tls.certresolver=letsencrypt"
      - "traefik.http.services.playbook.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
